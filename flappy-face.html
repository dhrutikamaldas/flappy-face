const CANVAS_W = 400, CANVAS_H = 600;
const GRAVITY = 0.38, FLAP_STRENGTH = -8;
const PIPE_WIDTH = 58, PIPE_GAP = 200, PIPE_SPEED = 1.6, PIPE_INTERVAL = 230;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const faceImg = new Image();
faceImg.src = FACE_SRC;

let state = { phase: 'start', highScore: 0 };

function makeParticle(x, y) {
  const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bcb','#c77dff'];
  return {
    x, y,
    vx: (Math.random() - 0.5) * 3,
    vy: (Math.random() - 2) * 2,
    color: colors[Math.floor(Math.random() * colors.length)],
    life: 1,
    size: Math.random() * 6 + 3,
    shape: Math.random() > 0.5 ? 'star' : 'circle'
  };
}

function drawStar(x, y, size, color) {
  ctx.save();
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
    const r = i % 2 === 0 ? size : size * 0.4;
    ctx.lineTo(x + r * Math.cos(angle), y + r * Math.sin(angle));
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawCloud(x, y, scale) {
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.arc(x, y, 20*scale, 0, Math.PI*2);
  ctx.arc(x+22*scale, y-8*scale, 16*scale, 0, Math.PI*2);
  ctx.arc(x+40*scale, y, 18*scale, 0, Math.PI*2);
  ctx.arc(x+20*scale, y+8*scale, 14*scale, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawPipe(x, topH) {
  const capH = 18, capX = 6;
  const g1 = ctx.createLinearGradient(x, 0, x + PIPE_WIDTH, 0);
  g1.addColorStop(0, '#3a9e3a'); g1.addColorStop(0.4, '#5ecf5e'); g1.addColorStop(1, '#2a7a2a');
  ctx.fillStyle = g1;
  ctx.fillRect(x, 0, PIPE_WIDTH, topH);
  const gc = ctx.createLinearGradient(x-capX, 0, x+PIPE_WIDTH+capX, 0);
  gc.addColorStop(0, '#2a7a2a'); gc.addColorStop(0.4, '#5ecf5e'); gc.addColorStop(1, '#1f6e1f');
  ctx.fillStyle = gc;
  ctx.beginPath();
  ctx.roundRect(x-capX, topH-capH, PIPE_WIDTH+capX*2, capH, 4);
  ctx.fill();
  ctx.strokeStyle = '#1f6e1f'; ctx.lineWidth = 2;
  ctx.strokeRect(x, 0, PIPE_WIDTH, topH);
  const botY = topH + PIPE_GAP;
  ctx.fillStyle = g1;
  ctx.fillRect(x, botY, PIPE_WIDTH, CANVAS_H - botY);
  ctx.fillStyle = gc;
  ctx.beginPath();
  ctx.roundRect(x-capX, botY, PIPE_WIDTH+capX*2, capH, 4);
  ctx.fill();
  ctx.strokeStyle = '#1f6e1f'; ctx.lineWidth = 2;
  ctx.strokeRect(x, botY, PIPE_WIDTH, CANVAS_H - botY);
}

function initGame() {
  state = {
    phase: 'playing',
    bird: { x: 80, y: CANVAS_H/2, vy: 0, angle: 0, wingFlap: 0 },
    pipes: [],
    particles: [],
    score: 0,
    highScore: state.highScore || 0,
    clouds: [
      { x: 60, y: 80, scale: 0.8, speed: 0.3 },
      { x: 200, y: 50, scale: 1.1, speed: 0.2 },
      { x: 320, y: 110, scale: 0.7, speed: 0.35 }
    ],
    groundX: 0
  };
}

function flap() {
  if (state.phase === 'playing') {
    state.bird.vy = FLAP_STRENGTH;
    for (let i = 0; i < 10; i++) state.particles.push(makeParticle(state.bird.x+20, state.bird.y+20));
  } else {
    initGame();
  }
}

document.getElementById('wrap').addEventListener('mousedown', flap);
document.getElementById('wrap').addEventListener('touchstart', e => { e.preventDefault(); flap(); });
window.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); flap(); } });

function loop() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

  // Sky
  const sky = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
  sky.addColorStop(0, '#87ceeb'); sky.addColorStop(0.7, '#b8e4f9'); sky.addColorStop(1, '#d4f1c7');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  if (state.phase === 'start') {
    state.clouds = state.clouds || [
      { x: 60, y: 80, scale: 0.8, speed: 0.3 },
      { x: 200, y: 50, scale: 1.1, speed: 0.2 },
      { x: 320, y: 110, scale: 0.7, speed: 0.35 }
    ];
    state.clouds.forEach(c => drawCloud(c.x, c.y, c.scale));
    const by = CANVAS_H/2 + Math.sin(Date.now()/400)*15;
    if (faceImg.complete && faceImg.naturalWidth) {
      ctx.save(); ctx.translate(90, by+20); ctx.rotate(-0.15);
      ctx.drawImage(faceImg, -28, -28, 56, 56); ctx.restore();
    }
    ctx.fillStyle = '#fff';
    ctx.font = "bold 36px 'Arial Black', Arial";
    ctx.textAlign = 'center';
    ctx.shadowColor = '#0008'; ctx.shadowBlur = 8;
    ctx.fillText('FLAPPY FACE', CANVAS_W/2, 120);
    ctx.shadowBlur = 0;
    ctx.font = '18px Arial'; ctx.fillStyle = '#ffe44d';
    ctx.fillText('Tap / Space to Start!', CANVAS_W/2, CANVAS_H/2+80);
    requestAnimationFrame(loop); return;
  }

  // Clouds
  state.clouds.forEach(c => {
    if (state.phase === 'playing') c.x -= c.speed;
    if (c.x < -120) c.x = CANVAS_W + 60;
    drawCloud(c.x, c.y, c.scale);
  });

  // Pipes
  if (state.phase === 'playing') {
    if (!state.pipes.length || state.pipes[state.pipes.length-1].x < CANVAS_W - PIPE_INTERVAL) {
      const topH = Math.floor(Math.random() * (CANVAS_H - PIPE_GAP - 130)) + 60;
      state.pipes.push({ x: CANVAS_W, topH, scored: false });
    }
    state.pipes.forEach(p => p.x -= PIPE_SPEED);
    state.pipes = state.pipes.filter(p => p.x > -PIPE_WIDTH - 20);
  }

  state.pipes.forEach(p => {
    if (!p.scored && state.bird.x > p.x + PIPE_WIDTH) {
      p.scored = true; state.score++;
      if (state.score > state.highScore) state.highScore = state.score;
      for (let i = 0; i < 18; i++) state.particles.push(makeParticle(state.bird.x+20, state.bird.y));
    }
  });

  state.pipes.forEach(p => drawPipe(p.x, p.topH));

  // Ground
  const groundY = CANVAS_H - 60;
  if (state.phase === 'playing') state.groundX = (state.groundX - PIPE_SPEED) % 40;
  const gg = ctx.createLinearGradient(0, groundY, 0, CANVAS_H);
  gg.addColorStop(0, '#8bc34a'); gg.addColorStop(0.15, '#6d9e2f'); gg.addColorStop(1, '#4a6e1c');
  ctx.fillStyle = gg; ctx.fillRect(0, groundY, CANVAS_W, CANVAS_H - groundY);
  ctx.fillStyle = '#9ecf52';
  for (let gx = state.groundX; gx < CANVAS_W; gx += 40) ctx.fillRect(gx, groundY, 20, 8);

  // Bird physics
  if (state.phase === 'playing') {
    state.bird.vy += GRAVITY;
    state.bird.y += state.bird.vy;
    state.bird.angle = Math.min(Math.PI/4, Math.max(-Math.PI/4, state.bird.vy * 0.065));
    state.bird.wingFlap += 0.3;
    const bx = state.bird.x+6, by2 = state.bird.y+6;
    for (const p of state.pipes) {
      const inX = bx < p.x+PIPE_WIDTH && bx+44 > p.x;
      if (inX && (by2 < p.topH || by2+44 > p.topH+PIPE_GAP)) {
        state.phase = 'dead';
        for (let i = 0; i < 30; i++) state.particles.push(makeParticle(state.bird.x+28, state.bird.y+28));
      }
    }
    if (state.bird.y+56 > groundY || state.bird.y < -20) state.phase = 'dead';
  }

  // Draw bird
  const wx = state.bird.x+20, wy = state.bird.y+20;
  ctx.save(); ctx.translate(wx, wy); ctx.rotate(state.bird.angle);
  ctx.save();
  ctx.rotate(-Math.sin(state.bird.wingFlap)*0.5 - 0.2);
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.ellipse(-14, -4, 22, 10, -0.4, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1; ctx.stroke();
  ctx.restore();
  if (faceImg.complete && faceImg.naturalWidth) {
    ctx.drawImage(faceImg, -28, -28, 56, 56);
  } else {
    ctx.fillStyle = '#ffcc44';
    ctx.beginPath(); ctx.arc(0, 0, 26, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // Particles
  state.particles = state.particles.filter(p => p.life > 0.05);
  state.particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.life -= 0.025;
    ctx.globalAlpha = p.life;
    if (p.shape === 'star') drawStar(p.x, p.y, p.size, p.color);
    else { ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size/2, 0, Math.PI*2); ctx.fill(); }
    ctx.globalAlpha = 1;
  });

  // HUD
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.roundRect(CANVAS_W-170, 10, 160, 70, 12); ctx.fill();
  ctx.fillStyle = '#ffe44d'; ctx.font = "bold 22px 'Arial Black', Arial"; ctx.textAlign = 'right';
  ctx.fillText('Score: ' + state.score, CANVAS_W-18, 40);
  ctx.fillStyle = '#fff'; ctx.font = '14px Arial';
  ctx.fillText('Best: ' + state.highScore, CANVAS_W-18, 68);

  // Game over
  if (state.phase === 'dead') {
    ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.fillStyle = '#ff4444'; ctx.font = "bold 42px 'Arial Black', Arial"; ctx.textAlign = 'center';
    ctx.shadowColor = '#000'; ctx.shadowBlur = 10;
    ctx.fillText('GAME OVER', CANVAS_W/2, CANVAS_H/2-30);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px Arial';
    ctx.fillText('Score: ' + state.score, CANVAS_W/2, CANVAS_H/2+20);
    ctx.fillStyle = '#ffe44d'; ctx.font = '16px Arial';
    ctx.fillText('Tap / Space to retry!', CANVAS_W/2, CANVAS_H/2+55);
  }

  requestAnimationFrame(loop);
}

loop();
</script>
